name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Skip the "brands" check -- we're not (yet) listed in
          # home-assistant/brands and shipping icons in-repo is not the
          # HACS convention. Revisit when submitting to HA brands.
          ignore: brands
